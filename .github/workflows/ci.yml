name: CI

# Roda em cada PR pra main + em push direto (proteção final).
# Objetivo: travar regressões antes de merge. Sem isso, cada PR
# depende de disciplina manual pra rodar `npm run test:*`.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs anteriores do mesmo PR/branch quando um novo push chega.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# O postinstall do puppeteer (dependência transitiva) baixa o Chrome no `npm ci`
# e falha por rede (ECONNRESET) de forma intermitente, derrubando jobs sem
# relação com a mudança. Nenhum código/teste do repo usa o browser do puppeteer,
# então pulamos o download — remove o flake sem perder cobertura.
env:
  PUPPETEER_SKIP_DOWNLOAD: 'true'

jobs:
  build:
    name: Build + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Typecheck agora é GATE (Epic 0, ADR-138): `npm run lint` retorna zero
      # (os erros legados foram zerados). Trava o PR que reintroduzir erro de
      # tipo — mantém a fundação limpa antes de ampliar autonomia de IA.
      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

  test:
    name: Test — ${{ matrix.suite.name }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    strategy:
      # fail-fast=false: quero ver TODAS as suítes que falharam num run só,
      # não parar no primeiro erro. Feedback denso vale mais que rápido.
      fail-fast: false
      matrix:
        suite:
          # === Tier 2 filosófico (a base sólida do último ciclo) ===
          - { name: 'tier1-manifesto-philosophy', script: 'test:tier1-manifesto-philosophy' }
          - { name: 'tier2-escuta-ativa', script: 'test:tier2-escuta-ativa' }
          - { name: 'tier2-recovery-radar', script: 'test:tier2-recovery-radar' }
          - { name: 'tier2-big-idea-bar', script: 'test:tier2-big-idea-bar' }
          - { name: 'tier2-recognition', script: 'test:tier2-recognition' }
          - { name: 'tier2-philosophy-audit', script: 'test:tier2-philosophy-audit' }
          - { name: 'ferrari-philosophy-prompts', script: 'test:ferrari-philosophy-prompts' }

          # === Isolamento multi-tenant + RBAC (segurança de base) ===
          - { name: 'tenant-isolation', script: 'test:isolation' }
          - { name: 'radar-isolation', script: 'test:radar-isolation' }
          - { name: 'prospect-isolation', script: 'test:prospect-isolation' }
